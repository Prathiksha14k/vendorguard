{% extends "base.html" %}
{% block content %}

<h2 class="mb-4">Bulk Import Vendors (CSV)</h2>

<div class="card shadow-sm p-4">
    <p class="text-muted">
        Your CSV should have these column headers:<br>
        <code>name, category, contact_email, contract_start, contract_end, data_sensitivity, access_scope, compliance_gaps, financial_health</code>
    </p>

    <form method="POST" enctype="multipart/form-data">
        <div class="mb-3">
            <input type="file" name="csv_file" accept=".csv" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary">Upload & Import</button>
    </form>
</div>

{% endblock %}
