<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VendorGuard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark" style="background-color:#1A2B4C;">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="{{ url_for('dashboard') }}">🛡️ VendorGuard</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('dashboard') }}">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('alerts_page') }}">Alerts</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('compliance_page') }}">Compliance</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('reports_page') }}">Reports</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('import_page') }}">Import</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('framework_page') }}">Framework</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('integrations_page') }}">Integrations</a></li>
                </ul>
                <a href="{{ url_for('vendor_new') }}" class="btn btn-light btn-sm fw-semibold">+ Add Vendor</a>
            </div>
        </div>
    </nav>

    <div class="container my-4">
        {% block content %}{% endblock %}
    </div>

    <footer class="text-center text-muted py-4">
        <small>VendorGuard — Third-Party Risk Scorecard Prototype</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
